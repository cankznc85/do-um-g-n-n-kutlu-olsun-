<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sürpriz ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --deep-navy: #0a192f;
            --paper: #ffffff;
            --text-color: #2d3436;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; 
            display: flex; justify-content: center; align-items: center;
            font-family: 'Montserrat', sans-serif;
        }

        /* Başlangıç Ekranı */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000; display: flex; 
            flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1s;
        }
        #intro-text { 
            font-size: 1.8rem; font-weight: 300;
            color: #fff; text-align: center; opacity: 0; width: 80%;
            letter-spacing: 1px;
        }
        .btn-start {
            margin-top: 30px; padding: 15px 35px; border: 1.5px solid #fff;
            color: #fff; background: transparent; border-radius: 5px;
            font-size: 0.9rem; letter-spacing: 3px; cursor: pointer;
            transition: 0.3s;
        }

        /* Gece ve Yıldızlar */
        #stars { position: absolute; width: 100%; height: 100%; opacity: 0; transition: 3s; z-index: 1; }
        .star { position: absolute; background: #fff; border-radius: 50%; animation: blink var(--d) infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* Estetik Dal */
        #branch {
            position: absolute; right: -20px; top: 15%; width: 250px; height: 15px;
            background: linear-gradient(to bottom, #2d1e12, #1a110a);
            border-radius: 20px 0 0 20px; transform: rotate(-5deg);
            display: none; z-index: 5;
        }

        /* Baykuş Sahnesi */
        #owl {
            position: absolute; left: -100px; top: 50%; font-size: 50px;
            z-index: 10; transition: all 5s cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }
        #mini-letter { font-size: 24px; position: absolute; bottom: -5px; left: 15px; transition: 0.5s; }

        /* Mektup ve Zarf Yapısı */
        .envelope-wrapper {
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%) scale(0);
            z-index: 100; transition: 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: none;
        }
        .envelope {
            width: 160px; height: 110px; background: #c59d5f;
            position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border-radius: 4px; cursor: pointer;
        }
        /* Zarfın Ön Kapakları (Mektubun önünde durur) */
        .envelope::before {
            content: ''; position: absolute; bottom: 0; left: 0;
            width: 0; height: 0;
            border-left: 80px solid transparent;
            border-right: 80px solid transparent;
            border-bottom: 60px solid #d4a373;
            z-index: 20;
        }
        .envelope::after {
            content: ''; position: absolute; top: 0; left: 0;
            border-left: 80px solid transparent; border-right: 80px solid transparent;
            border-top: 60px solid #bc8a5f; transform-origin: top; transition: 0.6s; z-index: 25;
        }
        .opened.envelope::after { transform: rotateX(180deg); z-index: 5; }
        
        .paper {
            width: 140px; height: 90px; background: var(--paper);
            position: absolute; left: 10px; top: 10px;
            transition: 1.2s 0.6s; z-index: 10;
            overflow: hidden; border-radius: 2px;
            display: flex; align-items: flex-start; justify-content: center;
        }
        .opened .paper { 
            height: 250px; 
            transform: translateY(-180px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .paper-text {
            font-size: 0.85rem; font-weight: 500; color: var(--text-color);
            text-align: center; padding: 20px; line-height: 1.6; opacity: 0; transition: 0.5s 1.5s;
        }
        .opened .paper-text { opacity: 1; }

        /* Mumlar */
        #candles { display: none; text-align: center; z-index: 50; }
        .c-box { display: flex; gap: 12px; justify-content: center; align-items: flex-end; }
        .c { width: 12px; background: #fdfdfd; border-radius: 3px; position: relative; }
        .f { width: 10px; height: 18px; background: #ff9d00; position: absolute; top: -25px; left: 50%; transform: translateX(-50%); border-radius: 50% 50% 20% 20%; box-shadow: 0 0 15px #ff9d00; animation: bounce 0.3s infinite alternate; }
        @keyframes bounce { from { transform: translateX(-50%) scale(1); } to { transform: translateX(-50%) scale(1.2); } }
        .info-tip { color: rgba(255,255,255,0.6); font-size: 0.7rem; margin-top: 25px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="intro-text">İyiki varsın, doğum günün kutlu olsun 💞</div>
        <button class="btn-start" onclick="startApp()">SÜRPRİZİ BAŞLAT</button>
    </div>

    <div id="stars"></div>

    <div id="candles">
        <div class="c-box" id="cRow"></div>
        <p class="info-tip">MİKROFONA ÜFLE VEYA EKRANA DOKUN</p>
    </div>

    <div id="branch"></div>
    <div id="owl">🦉<div id="mini-letter">✉️</div></div>

    <div id="wrapper" class="envelope-wrapper" onclick="openMe()">
        <div id="env" class="envelope">
            <div class="paper">
                <div class="paper-text">
                    Seninle geçirdiğim her saniye çok değerliydi. İyiki varsın, tekrardan doğum günün kutlu olsun. Nice mutlu senelere...<br><br>
                    Umarım hediyelerimi beğenirsin.<br><br>
                    Seni öpüyorum..
                </div>
            </div>
        </div>
    </div>

    <script>
        function startApp() {
            const btn = document.querySelector('.btn-start');
            const intro = document.getElementById('intro-text');
            btn.style.display = 'none';
            intro.style.opacity = '1';
            
            setTimeout(() => {
                document.getElementById('overlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('overlay').style.display = 'none';
                    showCandles();
                }, 1000);
            }, 3000);
        }

        function showCandles() {
            const row = document.getElementById('cRow');
            for(let i=0; i<5; i++) {
                const c = document.createElement('div');
                c.className = 'c'; c.style.height = (60 + Math.random()*20) + 'px';
                c.innerHTML = '<div class="f"></div>';
                row.appendChild(c);
            }
            document.getElementById('candles').style.display = 'block';
            startMic();
        }

        async function startMic() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const ctx = new AudioContext();
                const analyzer = ctx.createAnalyser();
                ctx.createMediaStreamSource(stream).connect(analyzer);
                const data = new Uint8Array(analyzer.frequencyBinCount);
                
                function loop() {
                    analyzer.getByteFrequencyData(data);
                    let volume = data.reduce((a,b)=>a+b)/data.length;
                    if(volume > 40) {
                        stream.getTracks().forEach(t => t.stop());
                        blowOut();
                    } else { requestAnimationFrame(loop); }
                }
                loop();
            } catch(e) { document.body.onclick = blowOut; }
        }

        function blowOut() {
            document.getElementById('candles').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('candles').style.display = 'none';
                document.body.style.background = 'var(--deep-navy)';
                document.getElementById('stars').style.opacity = '1';
                document.getElementById('branch').style.display = 'block';
                flyOwl();
            }, 800);
        }

        function flyOwl() {
            const owl = document.getElementById('owl');
            const mini = document.getElementById('mini-letter');
            owl.style.left = 'calc(100% - 160px)';
            owl.style.top = '10%';

            setTimeout(() => {
                mini.style.transform = 'translateY(250px) rotate(720deg)';
                mini.style.opacity = '0';
                
                setTimeout(() => {
                    const wrap = document.getElementById('wrapper');
                    wrap.style.display = 'block';
                    setTimeout(() => wrap.style.transform = 'translate(-50%, -50%) scale(1.5)', 100);
                }, 1000);
            }, 5000);
        }

        function openMe() { document.getElementById('env').classList.add('opened'); }

        const sc = document.getElementById('stars');
        for(let i=0; i<100; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.width = s.style.height = Math.random()*2.5+'px';
            s.style.left = Math.random()*100+'%'; s.style.top = Math.random()*100+'%';
            s.style.setProperty('--d', Math.random()*3+1+'s');
            sc.appendChild(s);
        }
    </script>
</body>
</html>
