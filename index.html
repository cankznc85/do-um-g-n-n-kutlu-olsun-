<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sürpriz ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --night-blue: radial-gradient(circle at bottom, #1a2a6c, #b21f1f, #fdbb2d);
            --paper: #fffef0;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; 
            display: flex; justify-content: center; align-items: center;
            font-family: 'Poppins', sans-serif;
        }

        /* Başlangıç Ekranı */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000; display: flex; 
            flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1s;
        }
        #intro-text { 
            font-family: 'Great Vibes', cursive; font-size: 2.2rem; 
            color: #fff; text-align: center; opacity: 0; width: 80%;
        }
        .btn-start {
            margin-top: 30px; padding: 12px 25px; border: 1px solid #fff;
            color: #fff; background: transparent; border-radius: 50px;
            font-size: 0.8rem; letter-spacing: 2px; cursor: pointer;
        }

        /* Gece ve Yıldızlar */
        #stars { position: absolute; width: 100%; height: 100%; opacity: 0; transition: 3s; }
        .star { position: absolute; background: #fff; border-radius: 50%; animation: blink var(--d) infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* Estetik Dal */
        #branch {
            position: absolute; right: -20px; top: 15%; width: 250px; height: 15px;
            background: linear-gradient(to bottom, #4b3621, #2d1e12);
            border-radius: 20px 0 0 20px; transform: rotate(-5deg);
            box-shadow: inset 0 -2px 5px rgba(0,0,0,0.5);
            display: none; z-index: 5;
        }
        #branch::before {
            content: ''; position: absolute; top: -15px; left: 40px;
            width: 80px; height: 8px; background: #3d2b1f;
            transform: rotate(-30deg); border-radius: 10px;
        }

        /* Baykuş Sahnesi */
        #owl {
            position: absolute; left: -100px; top: 50%; font-size: 50px;
            z-index: 10; transition: all 5s cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }
        #mini-letter { font-size: 22px; position: absolute; bottom: 0; left: 15px; transition: 0.5s; }

        /* Mektup ve Zarf */
        .envelope-wrapper {
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%) scale(0);
            z-index: 100; transition: 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .envelope {
            width: 130px; height: 90px; background: #d4a373;
            position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border-radius: 2px;
        }
        .envelope::after {
            content: ''; position: absolute; top: 0; left: 0;
            border-left: 65px solid transparent; border-right: 65px solid transparent;
            border-top: 50px solid #bc8a5f; transform-origin: top; transition: 0.6s; z-index: 2;
        }
        .opened.envelope::after { transform: rotateX(180deg); }
        
        .paper {
            width: 115px; height: 20px; background: var(--paper);
            position: absolute; left: 7.5px; bottom: 10px;
            transition: 1s 0.5s; z-index: 3; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .opened .paper { height: 220px; bottom: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .paper-text {
            font-family: 'Great Vibes', cursive; font-size: 1.1rem;
            color: #333; text-align: center; padding: 20px; line-height: 1.5;
        }

        /* Mumlar */
        #candles { display: none; text-align: center; z-index: 50; }
        .c-box { display: flex; gap: 10px; justify-content: center; align-items: flex-end; }
        .c { width: 10px; background: #eee; border-radius: 3px; position: relative; }
        .f { width: 8px; height: 15px; background: #ff9d00; position: absolute; top: -20px; left: 50%; transform: translateX(-50%); border-radius: 50% 50% 20% 20%; box-shadow: 0 0 10px #ff9d00; animation: bounce 0.2s infinite; }
        @keyframes bounce { from { transform: translateX(-50%) scale(1); } to { transform: translateX(-50%) scale(1.1); } }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="intro-text">İyiki varsın doğum günün kutlu olsun 💞</div>
        <button class="btn-start" onclick="startApp()">SÜRPRİZİ BAŞLAT</button>
    </div>

    <div id="stars"></div>

    <div id="candles">
        <div class="c-box" id="cRow"></div>
        <p style="color: #fff; font-size: 0.9rem; margin-top: 20px; letter-spacing: 3px;">ÜFLE...</p>
    </div>

    <div id="branch"></div>
    <div id="owl">🦉<div id="mini-letter">✉️</div></div>

    <div id="wrapper" class="envelope-wrapper" onclick="openMe()">
        <div id="env" class="envelope">
            <div class="paper">
                <div class="paper-text">Seninle geçirdiğim her saniye çok değerliydi iyiki varsın tekrardan doğum günün kutlu olsun nice mutlu senelere. Umarım hediyelerimi beğenirsin. öpüyorum seni..</div>
            </div>
        </div>
    </div>

    <script>
        function startApp() {
            const btn = document.querySelector('.btn-start');
            const intro = document.getElementById('intro-text');
            btn.style.display = 'none';
            intro.style.opacity = '1';
            
            setTimeout(() => {
                document.getElementById('overlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('overlay').style.display = 'none';
                    showCandles();
                }, 1000);
            }, 4000);
        }

        function showCandles() {
            const row = document.getElementById('cRow');
            for(let i=0; i<6; i++) {
                const c = document.createElement('div');
                c.className = 'c'; c.style.height = (50 + Math.random()*20) + 'px';
                c.innerHTML = '<div class="f"></div>';
                row.appendChild(c);
            }
            document.getElementById('candles').style.display = 'block';
            startMic();
        }

        async function startMic() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const ctx = new AudioContext();
                const analyzer = ctx.createAnalyser();
                ctx.createMediaStreamSource(stream).connect(analyzer);
                const data = new Uint8Array(analyzer.frequencyBinCount);
                
                function loop() {
                    analyzer.getByteFrequencyData(data);
                    if(data.reduce((a,b)=>a+b)/data.length > 35) {
                        stream.getTracks().forEach(t => t.stop());
                        blowOut();
                    } else { requestAnimationFrame(loop); }
                }
                loop();
            } catch(e) { document.body.onclick = blowOut; }
        }

        function blowOut() {
            document.getElementById('candles').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('candles').style.display = 'none';
                document.body.style.background = 'var(--night-blue)';
                document.getElementById('stars').style.opacity = '1';
                document.getElementById('branch').style.display = 'block';
                flyOwl();
            }, 1000);
        }

        function flyOwl() {
            const owl = document.getElementById('owl');
            const mini = document.getElementById('mini-letter');
            owl.style.left = 'calc(100% - 150px)';
            owl.style.top = '10%';

            // Baykuş dala konunca mektubu bıraksın
            setTimeout(() => {
                mini.style.transform = 'translateY(200px) rotate(360deg)';
                mini.style.opacity = '0';
                
                setTimeout(() => {
                    const wrap = document.getElementById('wrapper');
                    wrap.style.display = 'block';
                    setTimeout(() => wrap.style.transform = 'translate(-50%, -50%) scale(1.8)', 100);
                }, 800);
            }, 5000);
        }

        function openMe() { document.getElementById('env').classList.add('opened'); }

        // Yıldız oluşturma
        const sc = document.getElementById('stars');
        for(let i=0; i<80; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.width = s.style.height = Math.random()*3+'px';
            s.style.left = Math.random()*100+'%'; s.style.top = Math.random()*100+'%';
            s.style.setProperty('--d', Math.random()*3+1+'s');
            sc.appendChild(s);
        }
    </script>
</body>
</html>
