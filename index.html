<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sana Bir Mesaj Var ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000;
            --night-blue: radial-gradient(circle at center, #0a1128 0%, #000 100%);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Cinzel', serif;
        }

        /* Sahne 1: Estetik Mumlar */
        #stage1 {
            position: absolute; text-align: center;
            transition: opacity 2s ease;
        }

        .candle-arc {
            display: flex; gap: 12px; align-items: flex-end;
            justify-content: center; height: 150px;
        }

        .candle {
            width: 14px; background: #fdf5e6; /* Fildişi */
            border-radius: 4px 4px 2px 2px; position: relative;
            box-shadow: inset -3px 0 6px rgba(0,0,0,0.1);
        }

        .flame {
            width: 10px; height: 20px; background: #ffaa00;
            position: absolute; top: -22px; left: 50%;
            transform: translateX(-50%); border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 15px #ffaa00, 0 0 30px #ff6600;
            animation: flicker 0.1s infinite alternate;
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1) rotate(-1deg); }
            100% { transform: translateX(-50%) scale(1.05) rotate(1deg); }
        }

        .instruction {
            color: #fff; font-family: 'Great Vibes', cursive;
            font-size: 1.5rem; letter-spacing: 5px; margin-top: 40px;
            opacity: 0.4; cursor: pointer;
        }

        /* Sahne 2: Baykuş ve Gece */
        .night-active { background: var(--night-blue) !important; transition: background 3s ease; }

        .owl {
            position: absolute; font-size: 50px;
            left: -100px; top: 20%; display: none; z-index: 100;
        }

        @keyframes owlFly {
            0% { left: -100px; top: 20%; transform: rotate(10deg); }
            45% { left: 48%; top: 45%; transform: rotate(0deg); }
            55% { left: 52%; top: 45%; transform: rotate(0deg); }
            100% { left: 120%; top: 10%; transform: rotate(-10deg); }
        }

        /* Zarf ve Mektup Mekanizması */
        .envelope-wrapper {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            display: none; z-index: 50; cursor: pointer;
        }

        .envelope {
            width: 120px; height: 80px; background: #d4a373;
            position: relative; border-radius: 2px;
        }

        .envelope::after { /* Zarf kapağı */
            content: ''; position: absolute; top: 0; left: 0;
            border-left: 60px solid transparent;
            border-right: 60px solid transparent;
            border-top: 45px solid #bc8a5f;
            transform-origin: top; transition: transform 0.6s;
        }

        .opened.envelope::after { transform: rotateX(180deg); z-index: 0; }

        .paper {
            width: 100px; height: 0px; background: #fff;
            position: absolute; left: 10px; bottom: 5px;
            transition: all 1s 0.5s; overflow: hidden;
            padding: 0; display: flex; align-items: center; justify-content: center;
        }

        .opened .paper {
            height: 140px; bottom: 85px; padding: 15px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.2);
        }

        .paper-text {
            font-family: 'Great Vibes', cursive; font-size: 1.2rem;
            color: #333; text-align: center; white-space: nowrap;
        }

        .show-wrapper { display: block; animation: popIn 0.8s forwards cubic-bezier(0.17, 0.89, 0.32, 1.27); }
        @keyframes popIn { to { transform: translate(-50%, -50%) scale(1.5); } }

    </style>
</head>
<body>

    <div id="stage1">
        <div class="candle-arc" id="candles"></div>
        <p class="instruction" id="status">üfle.</p>
    </div>

    <div id="owl" class="owl">🦉</div>

    <div id="wrapper" class="envelope-wrapper" onclick="openEnvelope()">
        <div id="env" class="envelope">
            <div class="paper">
                <div class="paper-text">İyiki doğdun yavrum</div>
            </div>
        </div>
    </div>

    <script>
        // 16 Adet Mum Oluştur (Daha estetik yüksekliklerle)
        const candleCont = document.getElementById('candles');
        for(let i=0; i<16; i++) {
            const h = 60 + Math.sin(i * 0.4) * 20; // Dalgalı yükseklik
            const c = document.createElement('div');
            c.className = 'candle';
            c.style.height = h + 'px';
            c.innerHTML = '<div class="flame"></div>';
            candleCont.appendChild(c);
        }

        async function initMic() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const ctx = new AudioContext();
                const analyzer = ctx.createAnalyser();
                const src = ctx.createMediaStreamSource(stream);
                src.connect(analyzer);
                const data = new Uint8Array(analyzer.frequencyBinCount);

                function detect() {
                    analyzer.getByteFrequencyData(data);
                    let val = data.reduce((a,b) => a+b) / data.length;
                    if(val > 45) { // Üfleme şiddeti
                        blowOut();
                        stream.getTracks().forEach(t => t.stop());
                        return;
                    }
                    requestAnimationFrame(detect);
                }
                detect();
            } catch(e) {
                document.getElementById('status').innerText = "mikrofona izin ver yoksa tıklayamazsın...";
                document.getElementById('status').onclick = blowOut;
            }
        }

        function blowOut() {
            document.getElementById('stage1').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('stage1').style.display = 'none';
                document.body.classList.add('night-active');
                
                // Baykuş sahnesi
                const owl = document.getElementById('owl');
                owl.style.display = 'block';
                owl.style.animation = 'owlFly 7s linear forwards';

                // Baykuş tam ortadayken zarfı "düşür"
                setTimeout(() => {
                    document.getElementById('wrapper').classList.add('show-wrapper');
                }, 3200);

            }, 1500);
        }

        function openEnvelope() {
            document.getElementById('env').classList.add('opened');
        }

        window.onload = initMic;
    </script>
</body>
</html>
