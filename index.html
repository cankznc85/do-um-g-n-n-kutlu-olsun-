<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sana Bir Sürprizim Var ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&family=Montserrat:wght@300&display=swap" rel="stylesheet">
    <style>
        :root { 
            --night-blue: radial-gradient(circle at center, #0a1128 0%, #000 100%);
            --paper-color: #f8f1e7;
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; display: flex; justify-content: center; align-items: center; }
        
        /* Yıldızlar */
        #stars { position: absolute; width: 100%; height: 100%; display: none; pointer-events: none; z-index: 1; }
        .star { position: absolute; background: #fff; border-radius: 50%; animation: twinkle var(--duration) infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.8; } }

        /* Mumlar */
        #stage1 { position: absolute; text-align: center; z-index: 20; transition: opacity 1.5s; cursor: pointer; }
        .candle-box { display: flex; gap: 10px; align-items: flex-end; }
        .candle { width: 10px; background: linear-gradient(to right, #e0e0e0, #ffffff, #e0e0e0); border-radius: 2px; position: relative; }
        .flame { width: 8px; height: 15px; background: radial-gradient(ellipse at bottom, #ffea00 0%, #ff8800 100%); position: absolute; top: -18px; left: 50%; transform: translateX(-50%); border-radius: 50% 50% 20% 20%; box-shadow: 0 0 10px #ffaa00; animation: flicker 0.1s infinite alternate; }
        @keyframes flicker { from { transform: translateX(-50%) scale(1); } to { transform: translateX(-50%) scale(1.1) rotate(1deg); } }
        .instruction { color: #fff; font-family: 'Dancing Script', cursive; font-size: 1.4rem; margin-top: 25px; opacity: 0.5; letter-spacing: 4px; }

        /* Gerçekçi Dal */
        #branch { 
            position: absolute; right: -50px; top: 20%; width: 280px; height: 12px;
            background: linear-gradient(90deg, #3d2b1f 0%, #1a120b 100%);
            border-radius: 50% 0 0 50%; display: none; transform: rotate(-8deg); z-index: 5;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8);
        }
        #branch::before { /* Küçük sürgün dalı */
            content: ''; position: absolute; top: -15px; left: 40px; width: 60px; height: 6px;
            background: #2b1d0e; transform: rotate(-30deg); border-radius: 10px;
        }

        /* Baykuş Sahnesi */
        #owl-container { position: absolute; left: -150px; top: 35%; display: none; z-index: 100; font-size: 50px; }
        .held-letter { font-size: 22px; position: absolute; bottom: -5px; left: 12px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }

        @keyframes flyToBranch {
            0% { left: -150px; top: 35%; transform: rotate(5deg); }
            40% { left: 48%; top: 48%; transform: rotate(0deg); }
            100% { left: calc(100% - 210px); top: 12.5%; transform: rotate(-5deg); }
        }

        /* Zarif Mektup */
        .envelope-wrapper { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); display: none; z-index: 50; cursor: pointer; }
        .envelope { width: 100px; height: 65px; background: #c2946a; position: relative; border-radius: 2px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .envelope::after { content: ''; position: absolute; top: 0; left: 0; border-left: 50px solid transparent; border-right: 50px solid transparent; border-top: 35px solid #a67c52; transform-origin: top; transition: 0.6s; }
        .opened.envelope::after { transform: rotateX(180deg); }
        
        .paper { 
            width: 85px; height: 0; background: var(--paper-color); position: absolute; left: 7.5px; bottom: 5px; 
            transition: 1s 0.5s; overflow: hidden; display: flex; align-items: center; justify-content: center;
            border-radius: 1px;
        }
        .opened .paper { height: 130px; bottom: 75px; box-shadow: 0 -5px 15px rgba(0,0,0,0.3); }
        .paper-text { font-family: 'Montserrat', sans-serif; font-size: 0.85rem; color: #444; text-align: center; padding: 10px; line-height: 1.4; font-weight: 400; }

        .night-active { background: var(--night-blue) !important; transition: background 3s; }
    </style>
</head>
<body onclick="activateAudio()">

    <div id="stars"></div>

    <div id="stage1">
        <div class="candle-box" id="candleRow"></div>
        <p class="instruction" id="status">üfle.</p>
    </div>

    <div id="branch"></div>

    <div id="owl-container">
        <div class="owl">🦉</div>
        <div id="held-letter" class="held-letter">✉️</div>
    </div>

    <div id="wrapper" class="envelope-wrapper" onclick="openLetter(event)">
        <div id="env" class="envelope">
            <div class="paper">
                <div class="paper-text">İyi ki doğdun yavrum ✨</div>
            </div>
        </div>
    </div>

    <script>
        let audioStarted = false;

        // Estetik Mum Dizilimi (9 adet - Tek sıra zarif durur)
        const row = document.getElementById('candleRow');
        for(let i=0; i<9; i++) {
            const h = 50 + Math.sin(i * 0.8) * 12;
            const c = document.createElement('div');
            c.className = 'candle'; c.style.height = h + 'px';
            c.innerHTML = '<div class="flame"></div>';
            row.appendChild(c);
        }

        // Yıldız Tozu
        const starCont = document.getElementById('stars');
        for(let i=0; i<120; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 1.5 + 'px';
            star.style.width = size; star.style.height = size;
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.setProperty('--duration', Math.random() * 3 + 1 + 's');
            starCont.appendChild(star);
        }

        async function activateAudio() {
            if (audioStarted) return;
            audioStarted = true;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const analyzer = audioCtx.createAnalyser();
                const src = audioCtx.createMediaStreamSource(stream);
                src.connect(analyzer);
                const data = new Uint8Array(analyzer.frequencyBinCount);
                
                function detect() {
                    if (!audioStarted) return;
                    analyzer.getByteFrequencyData(data);
                    let val = data.reduce((a,b) => a+b) / data.length;
                    if(val > 38) { // Hassas algılama
                        startSequence(); 
                        stream.getTracks().forEach(t => t.stop());
                        audioStarted = false;
                        return; 
                    }
                    requestAnimationFrame(detect);
                }
                detect();
                document.getElementById('status').innerText = "şimdi...";
            } catch(e) {
                document.getElementById('status').onclick = startSequence;
            }
        }

        function startSequence() {
            document.getElementById('stage1').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('stage1').style.display = 'none';
                document.body.classList.add('night-active');
                document.getElementById('stars').style.display = 'block';
                document.getElementById('branch').style.display = 'block';
                
                const owl = document.getElementById('owl-container');
                owl.style.display = 'block';
                owl.style.animation = 'flyToBranch 7s cubic-bezier(0.4, 0, 0.2, 1) forwards';
                
                setTimeout(() => {
                    document.getElementById('held-letter').style.opacity = '0';
                    const wrap = document.getElementById('wrapper');
                    wrap.style.display = 'block';
                    setTimeout(() => wrap.style.transform = 'translate(-50%, -50%) scale(1.3)', 50);
                }, 2800);
            }, 1000);
        }

        function openLetter(e) {
            e.stopPropagation();
            document.getElementById('env').classList.add('opened');
        }
    </script>
</body>
</html>
