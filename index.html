<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sürpriz ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --deep-navy: #0a192f;
            --paper: #ffffff;
            --text-color: #1a1a1a;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; 
            display: flex; justify-content: center; align-items: center;
            font-family: 'Montserrat', sans-serif;
        }

        /* Başlangıç Ekranı */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000; display: flex; 
            flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1s;
        }
        #intro-text { 
            font-size: 1.5rem; font-weight: 300;
            color: #fff; text-align: center; opacity: 0; width: 85%;
            letter-spacing: 1px;
        }
        .btn-start {
            margin-top: 30px; padding: 12px 30px; border: 1.5px solid #fff;
            color: #fff; background: transparent; border-radius: 5px;
            font-size: 0.8rem; letter-spacing: 2px; cursor: pointer;
        }

        #stars { position: absolute; width: 100%; height: 100%; opacity: 0; transition: 3s; z-index: 1; }
        .star { position: absolute; background: #fff; border-radius: 50%; animation: blink var(--d) infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        #branch {
            position: absolute; right: -20px; top: 15%; width: 200px; height: 12px;
            background: linear-gradient(to bottom, #2d1e12, #1a110a);
            border-radius: 20px 0 0 20px; transform: rotate(-5deg);
            display: none; z-index: 5;
        }

        #owl {
            position: absolute; left: -80px; top: 40%; font-size: 40px;
            z-index: 10; transition: all 5s cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }
        #mini-letter { font-size: 20px; position: absolute; bottom: -5px; left: 10px; transition: 0.5s; }

        /* Zarf ve Kağıt - Ekran Uyumluluğu Artırıldı */
        .envelope-wrapper {
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%) scale(0);
            z-index: 100; transition: 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: none; width: 90%; max-width: 300px;
        }
        .envelope {
            width: 100%; height: 140px; background: #c59d5f;
            position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border-radius: 4px; cursor: pointer; margin: 0 auto;
        }
        .envelope::before {
            content: ''; position: absolute; bottom: 0; left: 0;
            width: 0; height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-bottom: 90px solid #d4a373;
            z-index: 20;
        }
        .envelope::after {
            content: ''; position: absolute; top: 0; left: 0;
            border-left: 150px solid transparent; border-right: 150px solid transparent;
            border-top: 90px solid #bc8a5f; transform-origin: top; transition: 0.6s; z-index: 25;
        }
        .opened.envelope::after { transform: rotateX(180deg); z-index: 5; }
        
        /* Kağıt Ekranla Uyumlu Hale Getirildi */
        .paper {
            width: 90%; height: 110px; background: var(--paper);
            position: absolute; left: 5%; top: 10px;
            transition: 1.2s 0.6s; z-index: 10;
            overflow-y: auto; border-radius: 5px;
            display: flex; align-items: flex-start; justify-content: center;
        }
        .opened .paper { 
            height: 350px; 
            width: 100%;
            left: 0;
            transform: translateY(-260px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            z-index: 150;
        }
        .paper-text {
            font-size: 0.95rem; 
            font-weight: 500; 
            color: var(--text-color);
            text-align: center; 
            padding: 20px; 
            line-height: 1.6; 
            opacity: 0; 
            transition: 0.5s 1.5s;
            width: 100%;
        }
        .opened .paper-text { opacity: 1; }
        .signature { font-weight: 600; margin-top: 15px; display: block; color: #d63031; }

        /* Mumlar */
        #candles { display: none; text-align: center; z-index: 50; transition: opacity 0.5s; }
        .c-box { display: flex; gap: 8px; justify-content: center; align-items: flex-end; }
        .c { width: 10px; background: #fdfdfd; border-radius: 3px; position: relative; }
        .f { 
            width: 8px; height: 15px; background: #ff9d00; 
            position: absolute; top: -20px; left: 50%; 
            transform: translateX(-50%); border-radius: 50%; 
            box-shadow: 0 0 10px #ff9d00; animation: bounce 0.3s infinite alternate;
            transition: opacity 0.3s;
        }
        @keyframes bounce { from { transform: translateX(-50%) scale(1); } to { transform: translateX(-50%) scale(1.2); } }
        .info-tip { color: rgba(255,255,255,0.6); font-size: 0.7rem; margin-top: 25px; letter-spacing: 1px; }

        @media (min-width: 600px) {
            #intro-text { font-size: 2rem; }
            .paper-text { font-size: 1.1rem; }
            .envelope-wrapper { max-width: 400px; }
            .envelope::before, .envelope::after { border-left-width: 200px; border-right-width: 200px; }
        }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="intro-text">İyiki varsın, doğum günün kutlu olsun 💞</div>
        <button class="btn-start" onclick="startApp()">SÜRPRİZİ BAŞLAT</button>
    </div>

    <div id="stars"></div>

    <div id="candles">
        <div class="c-box" id="cRow"></div>
        <p class="info-tip">MİKROFONA ÜFLE VEYA EKRANA DOKUN</p>
    </div>

    <div id="branch"></div>
    <div id="owl">🦉<div id="mini-letter">✉️</div></div>

    <div id="wrapper" class="envelope-wrapper" onclick="openMe()">
        <div id="env" class="envelope">
            <div class="paper">
                <div class="paper-text">
                    Seninle geçirdiğim her saniye çok değerliydi.<br><br>
                    İyiki varsın, tekrardan doğum günün kutlu olsun.<br><br>
                    Nice mutlu senelere... Umarım hediyeleri beğenirsin.<br>
                    <span class="signature">Seni öpüyorum..</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function startApp() {
            document.querySelector('.btn-start').style.display = 'none';
            document.getElementById('intro-text').style.opacity = '1';
            setTimeout(() => {
                document.getElementById('overlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('overlay').style.display = 'none';
                    showCandles();
                }, 1000);
            }, 3000);
        }

        function showCandles() {
            const row = document.getElementById('cRow');
            for(let i=0; i<5; i++) {
                const c = document.createElement('div');
                c.className = 'c'; c.style.height = (50 + Math.random()*20) + 'px';
                c.innerHTML = '<div class="f"></div>';
                row.appendChild(c);
            }
            document.getElementById('candles').style.display = 'block';
            startMic();
        }

        async function startMic() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const ctx = new AudioContext();
                const analyzer = ctx.createAnalyser();
                ctx.createMediaStreamSource(stream).connect(analyzer);
                const data = new Uint8Array(analyzer.frequencyBinCount);
                function loop() {
                    analyzer.getByteFrequencyData(data);
                    if(data.reduce((a,b)=>a+b)/data.length > 40) {
                        stream.getTracks().forEach(t => t.stop());
                        blowOut();
                    } else { requestAnimationFrame(loop); }
                }
                loop();
            } catch(e) { document.body.onclick = blowOut; }
        }

        function blowOut() {
            const flames = document.querySelectorAll('.f');
            flames.forEach(f => f.style.opacity = '0'); 
            setTimeout(() => {
                document.getElementById('candles').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('candles').style.display = 'none';
                    document.body.style.background = 'var(--deep-navy)';
                    document.getElementById('stars').style.opacity = '1';
                    document.getElementById('branch').style.display = 'block';
                    flyOwl();
                }, 500);
            }, 500);
        }

        function flyOwl() {
            const owl = document.getElementById('owl');
            const mini = document.getElementById('mini-letter');
            owl.style.left = 'calc(100% - 120px)';
            owl.style.top = '10%';
            setTimeout(() => {
                mini.style.transform = 'translateY(250px) rotate(720deg)';
                mini.style.opacity = '0';
                setTimeout(() => {
                    const wrap = document.getElementById('wrapper');
                    wrap.style.display = 'block';
                    setTimeout(() => wrap.style.transform = 'translate(-50%, -50%) scale(1)', 100);
                }, 1000);
            }, 5000);
        }

        function openMe() { document.getElementById('env').classList.add('opened'); }

        const sc = document.getElementById('stars');
        for(let i=0; i<80; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.width = s.style.height = Math.random()*2+'px';
            s.style.left = Math.random()*100+'%'; s.style.top = Math.random()*100+'%';
            s.style.setProperty('--d', Math.random()*3+1+'s');
            sc.appendChild(s);
        }
    </script>
</body>
</html>
