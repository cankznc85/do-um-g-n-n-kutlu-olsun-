<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İyi ki Doğdun ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000;
            --night-blue: radial-gradient(circle at center, #1a2a6c 0%, #050a1d 70%, #000 100%);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center;
            font-family: 'Cinzel', serif;
            transition: background 4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 16 Mum Düzeni */
        .candle-container {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 15px;
            align-items: flex-end;
            transition: opacity 1.5s ease;
            z-index: 5;
        }

        .candle {
            width: 12px; height: 70px;
            background: linear-gradient(to bottom, #fff, #ddd);
            border-radius: 2px; position: relative;
        }

        .flame {
            width: 10px; height: 18px;
            background: #ff9d00; position: absolute;
            top: -20px; left: 50%; transform: translateX(-50%);
            border-radius: 50% 50% 50% 50% / 70% 70% 30% 30%;
            box-shadow: 0 0 15px #ff9d00;
            animation: flicker 0.1s infinite alternate;
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1); opacity: 0.8; }
            100% { transform: translateX(-50%) scale(1.1); opacity: 1; }
        }

        .instruction {
            position: absolute; bottom: 15%;
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.1rem; letter-spacing: 3px;
            font-family: 'Great Vibes', cursive;
            text-align: center; cursor: pointer;
        }

        /* Sahne 2 & 3 */
        .night-active { background: var(--night-blue) !important; }

        .owl {
            position: absolute; font-size: 60px;
            left: -150px; top: 20%; display: none; z-index: 10;
        }

        @keyframes flyAcross {
            0% { left: -150px; top: 20%; transform: rotate(10deg); }
            45% { left: 45%; top: 45%; transform: rotate(0deg); }
            55% { left: 55%; top: 45%; transform: rotate(0deg); }
            100% { left: 120%; top: 10%; transform: rotate(-10deg); }
        }

        .letter {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 80px; cursor: pointer; display: none; z-index: 11;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .letter.show { display: block; transform: translate(-50%, -50%) scale(1); }

        .message-box h1 {
            color: #f3e5ab; font-family: 'Great Vibes', cursive;
            font-size: 3.5rem; text-shadow: 2px 2px 15px rgba(0,0,0,0.6);
            display: none; animation: fadeIn 3s forwards;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="candle-stage" class="candle-container">
        <!-- 16 Adet Mum Döngüyle Gelecek -->
    </div>
    
    <p id="blow-text" class="instruction">Mikrofona izin ver ve üfle...</p>

    <div id="owl-spirit" class="owl">🦉</div>
    <div id="magic-letter" class="letter" onclick="openGift()">✉️</div>
    <div id="final-stage" class="message-box"><h1 id="msg">İyiki doğdun yavrum</h1></div>

    <script>
        // 16 mumu oluştur
        const container = document.getElementById('candle-stage');
        for(let i=0; i<16; i++) {
            const candle = document.createElement('div');
            candle.className = 'candle';
            candle.innerHTML = '<div class="flame"></div>';
            container.appendChild(candle);
        }

        // Mikrofon Algılama Sistemi
        async function initAudio() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const analyser = audioContext.createAnalyser();
                const microphone = audioContext.createMediaStreamSource(stream);
                microphone.connect(analyser);
                analyser.fftSize = 256;
                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);

                function checkBlow() {
                    analyser.getByteFrequencyData(dataArray);
                    let sum = 0;
                    for(let i = 0; i < bufferLength; i++) { sum += dataArray[i]; }
                    let average = sum / bufferLength;

                    // Hassasiyet eşiği (40-60 arası idealdir)
                    if (average > 50) { 
                        makeMagic();
                        stream.getTracks().forEach(track => track.stop()); // Mikrofonu kapat
                        return; 
                    }
                    requestAnimationFrame(checkBlow);
                }
                checkBlow();
            } catch (err) {
                console.log("Mikrofon izni reddedildi, tıklama moduna geçiliyor.");
                document.getElementById('blow-text').innerText = "Cihaz mikrofona izin vermedi, buraya tıkla.";
                document.getElementById('blow-text').onclick = makeMagic;
            }
        }

        function makeMagic() {
            document.getElementById('candle-stage').style.opacity = '0';
            document.getElementById('blow-text').style.opacity = '0';
            
            setTimeout(() => {
                document.body.classList.add('night-active');
                document.getElementById('candle-stage').classList.add('hidden');
                document.getElementById('blow-text').classList.add('hidden');
                
                const owl = document.getElementById('owl-spirit');
                owl.style.display = 'block';
                owl.style.animation = 'flyAcross 6s ease-in-out forwards';

                setTimeout(() => {
                    const letter = document.getElementById('magic-letter');
                    letter.classList.add('show');
                }, 2800);
            }, 1000);
        }

        function openGift() {
            document.getElementById('magic-letter').classList.add('hidden');
            document.getElementById('msg').style.display = 'block';
        }

        // Sayfa yüklendiğinde mikrofonu başlat
        window.onload = initAudio;
    </script>
</body>
</html>
