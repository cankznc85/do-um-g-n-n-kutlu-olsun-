<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sana Bir Sürprizim Var ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&family=Montserrat:wght@400&display=swap" rel="stylesheet">
    <style>
        :root { 
            --night-blue: radial-gradient(circle at center, #0a1128 0%, #000 100%);
            --paper-color: #fcfaf7;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #000; 
            display: flex; justify-content: center; align-items: center;
            font-family: 'Montserrat', sans-serif;
        }

        /* Konfeti Stili */
        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            z-index: 60;
            opacity: 0.8;
            pointer-events: none;
            animation: fall 3s linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }

        /* 1. SAHNE: Açılış Mesajı */
        #intro-text {
            position: absolute;
            color: #fff;
            font-family: 'Dancing Script', cursive;
            font-size: 1.8rem;
            text-align: center;
            width: 85%;
            opacity: 0;
            transition: opacity 2s ease-in-out;
            z-index: 200;
            pointer-events: none;
        }
        
        #stars { position: absolute; width: 100%; height: 100%; display: none; pointer-events: none; z-index: 1; }
        .star { position: absolute; background: #fff; border-radius: 50%; animation: twinkle var(--duration) infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.8; } }

        /* 2. SAHNE: Mumlar */
        #stage1 { position: absolute; text-align: center; z-index: 50; opacity: 0; transition: opacity 1.5s; width: 100%; display: none; }
        .candle-box { display: flex; gap: 8px; align-items: flex-end; justify-content: center; }
        .candle { width: 8px; background: linear-gradient(to right, #e0e0e0, #fff, #e0e0e0); border-radius: 2px; position: relative; }
        .flame { width: 7px; height: 12px; background: orange; position: absolute; top: -15px; left: 50%; transform: translateX(-50%); border-radius: 50% 50% 20% 20%; box-shadow: 0 0 8px orange; animation: flicker 0.1s infinite alternate; }
        @keyframes flicker { from { transform: translateX(-50%) scale(1); } to { transform: translateX(-50%) scale(1.1) rotate(1deg); } }
        .instruction { color: #fff; font-family: 'Dancing Script', cursive; font-size: 1.3rem; margin-top: 20px; opacity: 0.6; letter-spacing: 2px; }

        /* 3. SAHNE: Dal ve Baykuş */
        #branch { position: absolute; right: -30px; top: 18%; width: 220px; height: 10px; background: linear-gradient(90deg, #3d2b1f 0%, #1a120b 100%); border-radius: 50% 0 0 50%; display: none; transform: rotate(-8deg); z-index: 5; }
        #owl-container { position: absolute; left: -100px; top: 35%; display: none; z-index: 10; font-size: 45px; pointer-events: none; }
        .held-letter { font-size: 20px; position: absolute; bottom: -5px; left: 10px; }

        @keyframes flyToBranchMobile {
            0% { left: -100px; top: 40%; transform: rotate(5deg); }
            45% { left: 40%; top: 50%; transform: rotate(0deg); }
            100% { left: calc(100% - 150px); top: 12%; transform: rotate(-5deg); }
        }

        /* 4. SAHNE: Mektup */
        .envelope-wrapper { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); display: none; z-index: 100; cursor: pointer; transition: transform 0.8s cubic-bezier(0.17, 0.89, 0.32, 1.27); }
        .envelope { width: 120px; height: 80px; background: #c2946a; position: relative; border-radius: 2px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); }
        .envelope::after { content: ''; position: absolute; top: 0; left: 0; border-left: 60px solid transparent; border-right: 60px solid transparent; border-top: 45px solid #a67c52; transform-origin: top; transition: 0.6s; z-index: 2; }
        .opened.envelope::after { transform: rotateX(180deg); }
        
        .paper { 
            width: 105px; height: 0; background: var(--paper-color); 
            position: absolute; left: 7.5px; bottom: 5px; 
            transition: all 1s 0.6s; overflow: hidden; 
            display: flex; align-items: center; justify-content: center; 
            border-radius: 2px; z-index: 3; 
        }
        .opened .paper { height: 190px; bottom: 45px; box-shadow: 0 5px 25px rgba(0,0,0,0.4); }
        
        .paper-text { 
            font-family: 'Dancing Script', cursive; 
            font-size: 0.9rem; 
            color: #222; 
            text-align: center; 
            padding: 15px; 
            line-height: 1.4; 
            font-weight: 600;
        }

        .night-active { background: var(--night-blue) !important; transition: background 3s; }
    </style>
</head>
<body onclick="activateFlow()">

    <div id="intro-text">İyiki varsın doğum günün kutlu olsun 💞</div>

    <div id="stars"></div>

    <div id="stage1">
        <div class="candle-box" id="candleRow"></div>
        <p class="instruction" id="status">üfle.</p>
    </div>

    <div id="branch"></div>

    <div id="owl-container">
        <div class="owl">🦉</div>
        <div id="held-letter" class="held-letter">✉️</div>
    </div>

    <div id="wrapper" class="envelope-wrapper" onclick="openLetter(event)">
        <div id="env" class="envelope">
            <div class="paper">
                <div class="paper-text">
                    Seninle geçirdiğim her saniye çok değerliydi iyiki varsın tekrardan doğum günün kutlu olsun nice mutlu senelere. Umarım hediyelerimi beğenirsin. öpüyorum seni..
                </div>
            </div>
        </div>
    </div>

    <script>
        let flowStarted = false;
        let audioStarted = false;

        function createConfetti() {
            const colors = ['#ffd700', '#ff69b4', '#ffffff', '#ffb6c1', '#daa520'];
            for(let i=0; i<50; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                c.style.left = Math.random() * 100 + 'vw';
                c.style.top = '-10px';
                c.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                c.style.animationDuration = (Math.random() * 2 + 2) + 's';
                c.style.animationDelay = (Math.random() * 1) + 's';
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 4000);
            }
        }

        function setupStage() {
            const row = document.getElementById('candleRow');
            for(let i=0; i<7; i++) {
                const h = 45 + Math.sin(i * 1) * 10;
                const c = document.createElement('div');
                c.className = 'candle'; c.style.height = h + 'px';
                c.innerHTML = '<div class="flame"></div>';
                row.appendChild(c);
            }
            const starCont = document.getElementById('stars');
            for(let i=0; i<60; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 2 + 'px';
                star.style.width = size; star.style.height = size;
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', Math.random() * 3 + 1 + 's');
                starCont.appendChild(star);
            }
        }

        function activateFlow() {
            if (flowStarted) return;
            flowStarted = true;
            const intro = document.getElementById('intro-text');
            intro.style.opacity = '1';

            setTimeout(() => {
                intro.style.opacity = '0';
                setTimeout(() => {
                    intro.style.display = 'none';
                    const s1 = document.getElementById('stage1');
                    s1.style.display = 'block';
                    setTimeout(() => { 
                        s1.style.opacity = '1';
                        activateAudio(); 
                    }, 50);
                }, 2000);
            }, 5000);
        }

        async function activateAudio() {
            if (audioStarted) return;
            audioStarted = true;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const analyzer = audioCtx.createAnalyser();
                const src = audioCtx.createMediaStreamSource(stream);
                src.connect(analyzer);
                const data = new Uint8Array(analyzer.frequencyBinCount);
                
                function detect() {
                    if (!audioStarted) return;
                    analyzer.getByteFrequencyData(data);
                    let val = data.reduce((a,b) => a+b) / data.length;
                    if(val > 35) { 
                        startSequence(); 
                        stream.getTracks().forEach(t => t.stop());
                        audioStarted = false;
                        return; 
                    }
                    requestAnimationFrame(detect);
                }
                detect();
            } catch(e) {
                document.getElementById('stage1').onclick = startSequence;
            }
        }

        function startSequence() {
            document.getElementById('stage1').style.opacity = '0';
            // Mum sönünce konfeti patlat!
            createConfetti();

            setTimeout(() => {
                document.getElementById('stage1').style.display = 'none';
                document.body.classList.add('night-active');
                document.getElementById('stars').style.display = 'block';
                document.getElementById('branch').style.display = 'block';
                
                const owl = document.getElementById('owl-container');
                owl.style.display = 'block';
                owl.style.animation = 'flyToBranchMobile 6s ease-in-out forwards';
                
                setTimeout(() => {
                    document.getElementById('held-letter').style.opacity = '0';
                    const wrap = document.getElementById('wrapper');
                    wrap.style.display = 'block';
                    setTimeout(() => wrap.style.transform = 'translate(-50%, -50%) scale(1.6)', 50);
                }, 2600);
            }, 1000);
        }

        function openLetter(e) {
            e.stopPropagation();
            document.getElementById('env').classList.add('opened');
        }

        window.onload = setupStage;
    </script>
</body>
</html>
